name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Compile
        run: python3 -m py_compile trio-handoff.py
      - name: Test
        run: python3 -m unittest discover -s tests -v
